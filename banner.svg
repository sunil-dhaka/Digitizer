<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="180">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="4" height="180" rx="2" fill="#34d399" opacity="0.8"/>
  <!-- Document page -->
  <rect x="90" y="48" width="40" height="52" rx="3" stroke="#a7f3d0" stroke-width="2" fill="none"/>
  <!-- Corner fold -->
  <path d="M118 48 L130 48 L130 60" stroke="#a7f3d0" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <path d="M118 48 L130 60" stroke="#a7f3d0" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Text lines on document -->
  <line x1="96" y1="64" x2="116" y2="64" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="96" y1="72" x2="122" y2="72" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="96" y1="80" x2="112" y2="80" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="96" y1="88" x2="118" y2="88" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Scan line -->
  <line x1="84" y1="76" x2="136" y2="76" stroke="url(#scanline)" stroke-width="2"/>
  <!-- AI sparkle -->
  <path d="M140 54 L142 50 L144 54 L148 56 L144 58 L142 62 L140 58 L136 56 Z" fill="#34d399" opacity="0.6"/>
  <!-- Text -->
  <text x="190" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#e6edf3" letter-spacing="2">Digitizer</text>
  <text x="190" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#8b949e" letter-spacing="0.5">AI Document Scanner</text>
  <line x1="190" y1="122" x2="400" y2="122" stroke="#21262d" stroke-width="1"/>
  <text x="190" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#6e7681">Extract text from documents with Gemini AI</text>
</svg>
